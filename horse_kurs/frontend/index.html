<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конно-спортивный клуб</title>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="container">
                <div class="logo">
                    <i class="fas fa-horse-head"></i>
                    <span>Конно-спортивный клуб</span>
                </div>
                <div class="nav" id="nav-menu">
                </div>
                <div id="auth-section" class="auth-section">
                </div>
            </div>
        </header>

        <main class="main">
            <div class="container">
                <div class="content-card" id="content">
                </div>
            </div>
        </main>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Конно-спортивный клуб. Все права защищены.</p>
            </div>
        </footer>
    </div>

    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('loginModal')">&times;</span>
            <h2>Вход в систему</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login">Логин (телефон):</label>
                    <input type="text" id="login" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="submit" class="btn" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Войти
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal('loginModal')">
                        Отмена
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="registerModal" class="modal">
    </div>

    <div id="profileModal" class="modal">
    </div>
</body>
</html>
